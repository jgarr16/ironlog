<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IronLog</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --s1: #131313;
      --s2: #1c1c1c;
      --s3: #272727;
      --border: #2e2e2e;
      --accent: #f97316;
      --text: #f0ede8;
      --muted: #666;
      --muted2: #888;
      --john: #4db8ff;
      --kyong: #ff6eb4;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overscroll-behavior: none;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      padding: 14px 16px 10px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
    }
    .header-week {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    /* ── Tab bar ─────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1;
      min-width: 54px;
      padding: 10px 4px 8px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .tab.active   { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.complete { color: var(--success); }
    .tab.complete.active { color: var(--success); border-bottom-color: var(--success); }
    .tab-check { font-size: 9px; margin-left: 2px; vertical-align: middle; }

    /* ── Content ─────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .panel { padding: 14px 14px 32px; }

    /* ── Day header ──────────────────────────────────── */
    .day-header { margin-bottom: 14px; }
    .day-num  { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 900; line-height: 1.1; }
    .day-focus { font-size: 13px; color: var(--muted2); margin-top: 1px; }

    /* ── Section label ───────────────────────────────── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* ── Cardio card ─────────────────────────────────── */
    .cardio-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .cardio-row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; }
    .cardio-row + .cardio-row { border-top: 1px solid var(--border); }
    .person-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      min-width: 48px;
      flex-shrink: 0;
    }
    .tag-john  { color: var(--john); }
    .tag-kyong { color: var(--kyong); }
    .cardio-checks { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; flex: 1; }
    .check-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .check-pill input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Stepper ─────────────────────────────────────── */
    .stepper { display: flex; align-items: center; }
    .stepper-btn {
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text);
      width: 30px;
      height: 30px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .stepper-btn:active { background: var(--border); }
    .stepper-btn.minus { border-radius: 6px 0 0 6px; border-right: none; }
    .stepper-btn.plus  { border-radius: 0 6px 6px 0; border-left: none; }
    .stepper-val {
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text);
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      min-width: 46px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .stepper-edit {
      background: var(--s3);
      border: 1px solid var(--accent);
      color: var(--text);
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      width: 58px;
      height: 30px;
      outline: none;
    }
    .laps-unit { font-size: 12px; color: var(--muted); margin-left: 5px; }

    /* ── Assist card ─────────────────────────────────── */
    .assist-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .assist-row { display: flex; align-items: center; padding: 11px 13px; }
    .assist-row + .assist-row { border-top: 1px solid var(--border); }

    /* ── Exercise card ───────────────────────────────── */
    .exercise-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .exercise-card.done { border-color: var(--success); }
    .exercise-inner {
      display: flex;
      gap: 10px;
      padding: 12px 13px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .exercise-card.done .exercise-inner { background: #111a12; }
    .ex-check { flex-shrink: 0; margin-top: 1px; }
    .ex-check input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--success); cursor: pointer; }
    .ex-body { flex: 1; min-width: 0; }

    .ex-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .ex-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
      flex: 1;
    }
    .img-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Barlow', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }
    .img-btn.has-img { border-color: var(--accent); color: var(--accent); }

    .ex-image-wrap { margin-bottom: 10px; display: none; }
    .ex-image-wrap.visible { display: block; }
    .ex-image-wrap img { width: 100%; border-radius: 6px; max-height: 140px; object-fit: cover; cursor: pointer; }

    /* Transposed weights grid */
    .weights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 12px; }
    .weight-person {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .weight-value-wrap { display: flex; align-items: baseline; gap: 3px; }
    .weight-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      border-bottom: 1px dashed var(--border);
      transition: border-color 0.15s;
    }
    .weight-value:hover { border-bottom-color: var(--accent); }
    .weight-unit   { font-size: 12px; color: var(--muted); }
    .weight-target { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .bodyweight-value { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; }
    .weight-edit-input {
      width: 72px;
      background: var(--s3);
      border: 1px solid var(--accent);
      color: var(--text);
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 22px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    /* ── Notes panel ─────────────────────────────────── */
    .action-btn {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }
    .action-btn:active { opacity: 0.75; }
    .btn-new-week       { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
    .btn-new-week.ready { background: var(--accent); color: #000; border-color: var(--accent); }

    .week-status {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 14px;
    }
    .week-status-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
    .week-status-count { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; }
    .week-status-date  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .notes-textarea {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      line-height: 1.5;
      resize: vertical;
      min-height: 120px;
    }
    .notes-textarea:focus { outline: none; border-color: var(--accent); }

    .history-section { margin-top: 24px; }
    .history-item  { background: var(--s2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 13px; margin-bottom: 8px; }
    .history-meta  { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .history-notes { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.5; }
    .history-empty { font-style: italic; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">IRONLOG</div>
    <div class="header-week" id="weekLabel"></div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── Program ──────────────────────────────────────────────────────────────────

const DAYS = [
  {
    num: 1, name: 'Push A', focus: 'Chest · Shoulders · Triceps',
    exercises: [
      { id: 'chest_press',      name: 'Chest Press',            john: { weight: 120, sets: 3, reps: '6–10'       }, kyong: { weight: 20,  sets: 3, reps: '8–12'      } },
      { id: 'shoulder_press_a', name: 'Shoulder Press',         john: { weight: 50,  sets: 3, reps: '6–10'       }, kyong: { weight: 10,  sets: 3, reps: '10'        } },
      { id: 'triceps_ext',      name: 'Triceps Extension',      john: { weight: 65,  sets: 3, reps: '8–12'       }, kyong: { weight: 10,  sets: 3, reps: '8–12'      } },
      { id: 'pallof_a',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  },
  {
    num: 2, name: 'Lower A', focus: 'Quads · Hamstrings · Glutes',
    exercises: [
      { id: 'leg_press_a',      name: 'Leg Press',              john: { weight: 250, sets: 3, reps: '6–10'       }, kyong: { weight: 60,  sets: 3, reps: '10–12'     } },
      { id: 'leg_curl_a',       name: 'Leg Curl',               john: { weight: 80,  sets: 3, reps: '8–12'       }, kyong: { weight: 20,  sets: 3, reps: '8–12'      } },
      { id: 'leg_ext_a',        name: 'Leg Extension',          john: { weight: 110, sets: 3, reps: '8–12'       }, kyong: { weight: 25,  sets: 3, reps: '8–12'      } },
      { id: 'hello_dolly_a',    name: 'Hello Dollies',          john: { weight: null, sets: 3, reps: '10'        }, kyong: { weight: null, sets: 3, reps: '10'       }, isBodyweight: true },
    ]
  },
  {
    num: 3, name: 'Pull A', focus: 'Back · Biceps · Rear Delts',
    exercises: [
      { id: 'lat_pulldown',     name: 'Lat Pulldown',           john: { weight: 100, sets: 3, reps: '10–12'      }, kyong: { weight: 30,  sets: 3, reps: '10–12'     } },
      { id: 'seated_row',       name: 'Seated Row',             john: { weight: 100, sets: 3, reps: '10–12'      }, kyong: { weight: 30,  sets: 3, reps: '10–12'     } },
      { id: 'face_pull',        name: 'Face Pull',              john: { weight: 40,  sets: 3, reps: '12–15'      }, kyong: { weight: 30,  sets: 3, reps: '10–15'     } },
      { id: 'pallof_c',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  },
  {
    num: 4, name: 'Push B', focus: 'Shoulders · Triceps · Chest vol.',
    exercises: [
      { id: 'shoulder_press_b', name: 'Shoulder Press',         john: { weight: 50,  sets: 3, reps: '10–12'      }, kyong: { weight: 10,  sets: 3, reps: '10–12'     } },
      { id: 'triceps_pushdown', name: 'Triceps Pushdown',       john: { weight: 60,  sets: 3, reps: '10–12'      }, kyong: { weight: 20,  sets: 3, reps: '10–12'     } },
      { id: 'pec_fly',          name: 'Pec Fly',                john: { weight: 115, sets: 3, reps: '8–12'       }, kyong: { weight: 10,  sets: 3, reps: '10–12'     } },
      { id: 'hello_dolly_b',    name: 'Hello Dollies',          john: { weight: null, sets: 3, reps: '10'        }, kyong: { weight: null, sets: 3, reps: '10'       }, isBodyweight: true },
    ]
  },
  {
    num: 5, name: 'Lower B', focus: 'Quads · Hamstrings · Calves vol.',
    exercises: [
      { id: 'leg_press_b',      name: 'Leg Press (vol.)',       john: { weight: 190, sets: 3, reps: '10'         }, kyong: { weight: 50,  sets: 3, reps: '10'        } },
      { id: 'ham_curl_b',       name: 'Hamstring Curl',         john: { weight: 65,  sets: 3, reps: '10'         }, kyong: { weight: 20,  sets: 3, reps: '10'        } },
      { id: 'calf_raise',       name: 'Calf Raise (Leg Press)', john: { weight: 150, sets: 3, reps: '10'         }, kyong: { weight: 50,  sets: 3, reps: '10'        } },
      { id: 'pallof_e',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  }
];

// ─── State ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'ironlog_v2';

function defaultWeights() {
  const w = {};
  DAYS.forEach(d => d.exercises.forEach(ex => {
    w[ex.id] = { john: ex.john.weight, kyong: ex.kyong.weight };
  }));
  return w;
}

function defaultDayState() {
  return {
    cardio: {
      john:  { swam: false, laps: 101 },
      kyong: { treadmill: false, stairway: false }
    },
    assistDone: { pullups: false, dips: false },
    done: {}
  };
}

function defaultCurrentWeek() {
  return {
    startDate: todayStr(),
    days: Object.fromEntries([1,2,3,4,5].map(n => [n, defaultDayState()])),
    notes: ''
  };
}

function buildFreshState() {
  return {
    weights: defaultWeights(),
    images:  {},
    currentWeek: defaultCurrentWeek(),
    history: []
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return buildFreshState();
    const s = JSON.parse(raw);
    [1,2,3,4,5].forEach(n => {
      if (!s.currentWeek.days[n]) {
        s.currentWeek.days[n] = defaultDayState();
      } else {
        const d = s.currentWeek.days[n];
        if (!d.assistDone) d.assistDone = { pullups: false, dips: false };
        if (!d.cardio.john.laps && d.cardio.john.laps !== 0) d.cardio.john.laps = 101;
        if (d.cardio.kyong.treadmill === undefined) d.cardio.kyong.treadmill = false;
        if (d.cardio.kyong.stairway  === undefined) d.cardio.kyong.stairway  = false;
      }
    });
    return s;
  } catch {
    return buildFreshState();
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ─── Helpers ──────────────────────────────────────────────────────────────────

function todayStr() {
  return new Date().toLocaleDateString('en-CA');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// A day is complete when every exercise in it is checked off
function isDayComplete(dayNum) {
  const day      = DAYS.find(d => d.num === dayNum);
  const dayState = state.currentWeek.days[dayNum];
  return day.exercises.every(ex => dayState.done[ex.id] === true);
}

function allDaysComplete() {
  return [1,2,3,4,5].every(n => isDayComplete(n));
}

function daysCompleteCount() {
  return [1,2,3,4,5].filter(n => isDayComplete(n)).length;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function buildStepper(initialValue, onChange, { min = 0, step = 1 } = {}) {
  let current = initialValue;

  const wrap = document.createElement('div');
  wrap.className = 'stepper';

  const minus = document.createElement('button');
  minus.className = 'stepper-btn minus';
  minus.textContent = '−';
  minus.type = 'button';

  const valEl = document.createElement('span');
  valEl.className = 'stepper-val';
  valEl.textContent = current;

  const plus = document.createElement('button');
  plus.className = 'stepper-btn plus';
  plus.textContent = '+';
  plus.type = 'button';

  minus.addEventListener('click', () => {
    if (current - step >= min) {
      current -= step;
      valEl.textContent = current;
      onChange(current);
    }
  });
  plus.addEventListener('click', () => {
    current += step;
    valEl.textContent = current;
    onChange(current);
  });
  valEl.addEventListener('click', () => {
    const input = document.createElement('input');
    input.className = 'stepper-edit';
    input.type = 'number';
    input.inputMode = 'numeric';
    input.value = current;
    wrap.replaceChild(input, valEl);
    input.focus();
    input.select();
    const commit = () => {
      const v = parseInt(input.value, 10);
      if (!isNaN(v) && v >= min) { current = v; valEl.textContent = current; onChange(current); }
      if (input.parentNode === wrap) wrap.replaceChild(valEl, input);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  });

  wrap.appendChild(minus);
  wrap.appendChild(valEl);
  wrap.appendChild(plus);
  return wrap;
}

// ─── Render ───────────────────────────────────────────────────────────────────

let activeTab = 1;

function render() {
  renderWeekLabel();
  renderTabs();
  renderContent();
}

// Lightweight tab-only refresh — called after checkbox changes to update ✓ without resetting scroll
function refreshTabs() {
  renderWeekLabel();
  renderTabs();
}

function renderWeekLabel() {
  document.getElementById('weekLabel').textContent = 'Week of ' + formatDate(state.currentWeek.startDate);
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  DAYS.forEach(day => {
    const complete = isDayComplete(day.num);
    const tab = document.createElement('div');
    tab.className = 'tab'
      + (activeTab === day.num ? ' active' : '')
      + (complete ? ' complete' : '');
    tab.innerHTML = 'Day ' + day.num + (complete ? ' <span class="tab-check">✓</span>' : '');
    tab.addEventListener('click', () => { activeTab = day.num; render(); });
    bar.appendChild(tab);
  });

  const notesTab = document.createElement('div');
  notesTab.className = 'tab' + (activeTab === 'notes' ? ' active' : '');
  notesTab.textContent = 'Notes';
  notesTab.addEventListener('click', () => { activeTab = 'notes'; render(); });
  bar.appendChild(notesTab);
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(activeTab === 'notes' ? buildNotesPanel() : buildDayPanel(activeTab));
}

// ─── Day panel ────────────────────────────────────────────────────────────────

function buildDayPanel(dayNum) {
  const day      = DAYS.find(d => d.num === dayNum);
  const dayState = state.currentWeek.days[dayNum];

  const panel = document.createElement('div');
  panel.className = 'panel';

  panel.insertAdjacentHTML('beforeend', `
    <div class="day-header">
      <div class="day-num">Day ${dayNum}</div>
      <div class="day-name">${day.name}</div>
      <div class="day-focus">${day.focus}</div>
    </div>
  `);

  // ── Cardio ──────────────────────────────────────────
  panel.insertAdjacentHTML('beforeend', '<div class="section-label">Cardio</div>');

  const cardioCard = document.createElement('div');
  cardioCard.className = 'cardio-card';

  // John — swim + lap stepper
  const johnRow = document.createElement('div');
  johnRow.className = 'cardio-row';

  const johnTag = document.createElement('div');
  johnTag.className = 'person-tag tag-john';
  johnTag.textContent = 'JOHN';

  const johnChecks = document.createElement('div');
  johnChecks.className = 'cardio-checks';

  const swimLabel = document.createElement('label');
  swimLabel.className = 'check-pill';
  const swimCb = document.createElement('input');
  swimCb.type = 'checkbox';
  swimCb.checked = dayState.cardio.john.swam;
  swimCb.addEventListener('change', e => { dayState.cardio.john.swam = e.target.checked; saveState(); });
  swimLabel.appendChild(swimCb);
  swimLabel.insertAdjacentText('beforeend', ' Swam');
  johnChecks.appendChild(swimLabel);

  const lapStepper = buildStepper(
    dayState.cardio.john.laps,
    v => { dayState.cardio.john.laps = v; saveState(); },
    { min: 0, step: 1 }
  );
  johnChecks.appendChild(lapStepper);
  johnChecks.insertAdjacentHTML('beforeend', '<span class="laps-unit">laps</span>');

  johnRow.appendChild(johnTag);
  johnRow.appendChild(johnChecks);
  cardioCard.appendChild(johnRow);

  // Kyong — treadmill + stairway
  const kyongRow = document.createElement('div');
  kyongRow.className = 'cardio-row';
  kyongRow.innerHTML = `
    <div class="person-tag tag-kyong">KYONG</div>
    <div class="cardio-checks">
      <label class="check-pill">
        <input type="checkbox" data-c="kyong-treadmill" ${dayState.cardio.kyong.treadmill ? 'checked' : ''}>
        Treadmill
      </label>
      <label class="check-pill">
        <input type="checkbox" data-c="kyong-stairway" ${dayState.cardio.kyong.stairway ? 'checked' : ''}>
        Stairway
      </label>
    </div>
  `;
  kyongRow.querySelectorAll('[data-c]').forEach(el => {
    el.addEventListener('change', e => {
      const k = e.target.dataset.c;
      if      (k === 'kyong-treadmill') dayState.cardio.kyong.treadmill = e.target.checked;
      else if (k === 'kyong-stairway')  dayState.cardio.kyong.stairway  = e.target.checked;
      saveState();
    });
  });
  cardioCard.appendChild(kyongRow);
  panel.appendChild(cardioCard);

  // ── Pull-ups & Dips ─────────────────────────────────
  panel.insertAdjacentHTML('beforeend', '<div class="section-label">Pull-ups &amp; Dips</div>');

  const assistCard = document.createElement('div');
  assistCard.className = 'assist-card';
  [
    { key: 'pullups', label: 'Assisted Pull-ups' },
    { key: 'dips',    label: 'Dips'              }
  ].forEach(item => {
    const row = document.createElement('div');
    row.className = 'assist-row';
    const lbl = document.createElement('label');
    lbl.className = 'check-pill';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = dayState.assistDone[item.key] || false;
    cb.addEventListener('change', e => { dayState.assistDone[item.key] = e.target.checked; saveState(); });
    lbl.appendChild(cb);
    lbl.insertAdjacentText('beforeend', ' ' + item.label);
    row.appendChild(lbl);
    assistCard.appendChild(row);
  });
  panel.appendChild(assistCard);

  // ── Weights ─────────────────────────────────────────
  panel.insertAdjacentHTML('beforeend', '<div class="section-label">Weights</div>');

  day.exercises.forEach(ex => {
    panel.appendChild(buildExerciseCard(ex, dayState));
  });

  return panel;
}

// ─── Exercise card ────────────────────────────────────────────────────────────

function buildExerciseCard(ex, dayState) {
  const done   = dayState.done[ex.id] || false;
  const johnW  = (state.weights[ex.id] || {}).john  ?? ex.john.weight;
  const kyongW = (state.weights[ex.id] || {}).kyong ?? ex.kyong.weight;
  const imgUrl = state.images[ex.id] || '';

  const card = document.createElement('div');
  card.className = 'exercise-card' + (done ? ' done' : '');

  const inner = document.createElement('div');
  inner.className = 'exercise-inner';

  // Done checkbox
  const checkWrap = document.createElement('div');
  checkWrap.className = 'ex-check';
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = done;
  checkbox.addEventListener('change', e => {
    dayState.done[ex.id] = e.target.checked;
    saveState();
    card.classList.toggle('done', e.target.checked);
    refreshTabs(); // update ✓ without resetting scroll
  });
  checkWrap.appendChild(checkbox);
  inner.appendChild(checkWrap);

  // Body
  const body = document.createElement('div');
  body.className = 'ex-body';

  // Name + image button
  const nameRow = document.createElement('div');
  nameRow.className = 'ex-name-row';
  nameRow.innerHTML = `<div class="ex-name">${esc(ex.name)}</div>`;

  const imgBtn = document.createElement('button');
  imgBtn.className = 'img-btn' + (imgUrl ? ' has-img' : '');
  imgBtn.type = 'button';
  imgBtn.textContent = imgUrl ? '📷' : 'img';
  imgBtn.title = imgUrl ? 'View / change image' : 'Add image URL';
  imgBtn.addEventListener('click', () => {
    const url = prompt(`Image URL for ${ex.name}:\n(leave blank to remove)`, state.images[ex.id] || '');
    if (url === null) return;
    if (url.trim()) state.images[ex.id] = url.trim();
    else delete state.images[ex.id];
    saveState();
    render();
  });
  nameRow.appendChild(imgBtn);
  body.appendChild(nameRow);

  // Image
  if (imgUrl) {
    const imgWrap = document.createElement('div');
    imgWrap.className = 'ex-image-wrap visible';
    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = ex.name;
    img.addEventListener('click', () => window.open(imgUrl, '_blank'));
    imgWrap.appendChild(img);
    body.appendChild(imgWrap);
  }

  // Weights grid
  const grid = document.createElement('div');
  grid.className = 'weights-grid';

  ['john', 'kyong'].forEach(person => {
    const exDef = ex[person];
    const wVal  = person === 'john' ? johnW : kyongW;
    const col   = document.createElement('div');
    col.className = 'weight-col';

    const personLabel = document.createElement('div');
    personLabel.className = 'weight-person tag-' + person;
    personLabel.textContent = person.toUpperCase();
    col.appendChild(personLabel);

    if (ex.isBodyweight) {
      const bw = document.createElement('div');
      bw.className = 'bodyweight-value';
      bw.textContent = `${exDef.sets}×${exDef.reps}`;
      col.appendChild(bw);
    } else {
      const valueWrap = document.createElement('div');
      valueWrap.className = 'weight-value-wrap';

      const valueEl = document.createElement('span');
      valueEl.className = 'weight-value';
      valueEl.textContent = wVal;
      valueEl.addEventListener('click', () => {
        const input = document.createElement('input');
        input.className = 'weight-edit-input';
        input.type = 'number';
        input.inputMode = 'numeric';
        input.value = wVal;
        valueWrap.replaceChild(input, valueEl);
        input.focus();
        input.select();
        const commit = () => {
          const v = parseInt(input.value, 10);
          if (!isNaN(v) && v > 0) {
            if (!state.weights[ex.id]) state.weights[ex.id] = {};
            state.weights[ex.id][person] = v;
            saveState();
          }
          render();
        };
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
      });

      valueWrap.appendChild(valueEl);
      valueWrap.insertAdjacentHTML('beforeend', '<span class="weight-unit">lb</span>');
      col.appendChild(valueWrap);

      const target = document.createElement('div');
      target.className = 'weight-target';
      target.textContent = `${exDef.sets}×${exDef.reps}`;
      col.appendChild(target);
    }

    grid.appendChild(col);
  });

  body.appendChild(grid);
  inner.appendChild(body);
  card.appendChild(inner);
  return card;
}

// ─── Notes panel ──────────────────────────────────────────────────────────────

function buildNotesPanel() {
  const panel = document.createElement('div');
  panel.className = 'panel';

  const complete  = allDaysComplete();
  const doneCount = daysCompleteCount();

  panel.insertAdjacentHTML('beforeend', `
    <div class="week-status">
      <div class="week-status-label">WEEK STATUS</div>
      <div class="week-status-count" style="color:${complete ? 'var(--success)' : 'var(--text)'}">
        ${doneCount}/5 Days Complete${complete ? ' ✓' : ''}
      </div>
      <div class="week-status-date">Week of ${formatDate(state.currentWeek.startDate)}</div>
    </div>
  `);

  panel.insertAdjacentHTML('beforeend', '<div class="section-label">Weekly Feedback &amp; Weight Changes</div>');

  const textarea = document.createElement('textarea');
  textarea.className = 'notes-textarea';
  textarea.placeholder = 'Note weight changes for next week, how sessions felt, what to adjust…';
  textarea.value = state.currentWeek.notes || '';
  textarea.addEventListener('input', e => { state.currentWeek.notes = e.target.value; saveState(); });
  panel.appendChild(textarea);

  const newWeekBtn = document.createElement('button');
  newWeekBtn.type = 'button';
  newWeekBtn.className = 'action-btn btn-new-week' + (complete ? ' ready' : '');
  newWeekBtn.textContent = complete
    ? 'Start New Week'
    : `Start New Week (${5 - doneCount} day${5 - doneCount !== 1 ? 's' : ''} remaining)`;
  newWeekBtn.addEventListener('click', () => {
    if (!complete && !confirm(`Only ${doneCount} of 5 days complete. Start new week anyway?`)) return;
    startNewWeek();
  });
  panel.appendChild(newWeekBtn);

  if (state.history && state.history.length > 0) {
    const histSection = document.createElement('div');
    histSection.className = 'history-section';
    histSection.insertAdjacentHTML('beforeend', '<div class="section-label">Previous Weeks</div>');
    [...state.history].reverse().forEach(week => {
      const days = [1,2,3,4,5].filter(n =>
        DAYS.find(d => d.num === n).exercises.every(ex => week.days?.[n]?.done?.[ex.id] === true)
      ).length;
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-meta">Week of ${formatDate(week.startDate)} &middot; ${days}/5 days</div>
        <div class="history-notes">
          ${week.notes ? esc(week.notes) : '<span class="history-empty">No notes recorded</span>'}
        </div>
      `;
      histSection.appendChild(item);
    });
    panel.appendChild(histSection);
  }

  return panel;
}

// ─── New week ─────────────────────────────────────────────────────────────────

function startNewWeek() {
  state.history.push({
    startDate: state.currentWeek.startDate,
    notes:     state.currentWeek.notes,
    days:      JSON.parse(JSON.stringify(state.currentWeek.days))
  });
  state.currentWeek = defaultCurrentWeek();
  saveState();
  activeTab = 1;
  render();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
