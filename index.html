<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IronLog</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --s1: #131313;
      --s2: #1c1c1c;
      --s3: #272727;
      --border: #2e2e2e;
      --accent: #f97316;
      --text: #f0ede8;
      --muted: #666;
      --muted2: #888;
      --john: #4db8ff;
      --kyong: #ff6eb4;
      --success: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      overscroll-behavior: none;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      padding: 12px 16px 10px;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .header-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
    }
    .header-week {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-align: right;
    }

    /* ── Tab bar ─────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1;
      min-width: 54px;
      padding: 10px 4px 8px;
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .tab.active   { color: var(--accent); border-bottom-color: var(--accent); }
    .tab.complete { color: var(--success); }
    .tab.complete.active { color: var(--success); border-bottom-color: var(--success); }
    .tab-check { font-size: 9px; margin-left: 2px; vertical-align: middle; }

    /* ── Content ─────────────────────────────────────── */
    .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .panel { padding: 14px 14px 32px; }

    /* ── Day header ──────────────────────────────────── */
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .day-focus { font-size: 13px; color: var(--muted2); }
    .day-header .section-chevron {
      font-size: 22px;
      padding: 12px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 48px;
      min-height: 44px;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Section label ───────────────────────────────── */
    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .section-chevron {
      font-size: 11px;
      color: var(--muted);
      transition: transform 0.2s;
      line-height: 1;
    }
    .section-chevron.collapsed { transform: rotate(-90deg); }
    .section-body.collapsed { display: none; }
    .caret-toggle {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 2px 0 6px;
    }

    /* ── Cardio card ─────────────────────────────────── */
    .cardio-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .cardio-row { display: flex; align-items: center; gap: 10px; padding: 11px 13px; }
    .cardio-row + .cardio-row { border-top: 1px solid var(--border); }
    .person-tag {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      min-width: 48px;
      flex-shrink: 0;
    }
    .tag-john  { color: var(--john); }
    .tag-kyong { color: var(--kyong); }
    .cardio-checks { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; flex: 1; }
    .check-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .check-pill input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Stepper ─────────────────────────────────────── */
    .stepper { display: flex; align-items: center; }
    .stepper-btn {
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text);
      width: 30px;
      height: 30px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .stepper-btn:active { background: var(--border); }
    .stepper-btn.minus { border-radius: 6px 0 0 6px; border-right: none; }
    .stepper-btn.plus  { border-radius: 0 6px 6px 0; border-left: none; }
    .stepper-val {
      background: var(--s3);
      border: 1px solid var(--border);
      color: var(--text);
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      min-width: 46px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .stepper-edit {
      background: var(--s3);
      border: 1px solid var(--accent);
      color: var(--text);
      text-align: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 17px;
      width: 58px;
      height: 30px;
      outline: none;
    }
    .laps-unit { font-size: 12px; color: var(--muted); margin-left: 5px; }

    /* Top collapsible strip (cardio / body weight / assist) — larger type */
    .top-strip .check-pill {
      font-size: 16px;
    }
    .top-strip .check-pill input[type="checkbox"] {
      width: 20px;
      height: 20px;
    }
    .top-strip .person-tag {
      font-size: 14px;
      min-width: 52px;
    }
    .top-strip .laps-unit {
      font-size: 14px;
      margin-left: 6px;
    }
    .top-strip .stepper-val {
      font-size: 19px;
      min-width: 50px;
      height: 34px;
    }
    .top-strip .stepper-btn {
      width: 34px;
      height: 34px;
      font-size: 20px;
    }
    .top-strip .stepper-btn.minus { border-radius: 7px 0 0 7px; }
    .top-strip .stepper-btn.plus  { border-radius: 0 7px 7px 0; }
    .top-strip .cardio-row,
    .top-strip .assist-row {
      padding: 13px 14px;
    }

    /* ── Assist card ─────────────────────────────────── */
    .assist-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .assist-row { display: flex; align-items: center; padding: 11px 13px; }
    .assist-row + .assist-row { border-top: 1px solid var(--border); }

    /* ── Exercise card ───────────────────────────────── */
    .exercise-card {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .exercise-card.done { border-color: var(--success); }
    .exercise-inner {
      display: flex;
      gap: 10px;
      padding: 12px 13px;
      align-items: flex-start;
      transition: background 0.15s;
    }
    .exercise-card.done .exercise-inner { background: #111a12; }
    .ex-body { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: stretch; }

    .ex-name-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .ex-done-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      margin-bottom: 0;
      width: 100%;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .ex-done-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
      flex-shrink: 0;
    }
    .ex-done-label {
      font-size: 14px;
      color: var(--muted2);
      letter-spacing: 0.3px;
    }
    .ex-weight-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .weight-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 5px;
      width: 100%;
    }
    .ex-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.35px;
      flex: 1;
      min-width: 0;
    }
    .ex-name-right {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .ex-thumb {
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      cursor: pointer;
      display: block;
      background: var(--s3);
    }
    /* Tall image column on the right; title + lifters + Done (bottom) in text column */
    .exercise-inner.has-ex-thumb {
      align-items: stretch;
      gap: 12px;
      padding: 10px 10px 12px 12px;
    }
    .exercise-inner.has-ex-thumb .ex-body {
      flex: 1 1 0;
      min-width: 0;
      padding-right: 2px;
      align-items: center;
    }
    .exercise-inner.has-ex-thumb .ex-name-row {
      width: 100%;
      justify-content: center;
      margin-bottom: 10px;
    }
    .exercise-inner.has-ex-thumb .ex-name {
      flex: none;
      width: 100%;
      text-align: center;
      font-size: 21px;
      font-weight: 900;
      letter-spacing: 0.5px;
      line-height: 1.15;
    }
    .exercise-inner.has-ex-thumb .ex-done-row {
      margin-top: 14px;
      padding-top: 2px;
    }
    .exercise-inner.has-ex-thumb .ex-done-label {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.8px;
    }
    .exercise-inner.has-ex-thumb .ex-weight-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 100%;
    }
    .exercise-inner.has-ex-thumb .weight-row {
      align-items: center;
      padding: 12px 8px 14px;
      background: var(--s3);
      border: 1px solid var(--border);
      border-radius: 10px;
      gap: 10px;
      box-sizing: border-box;
    }
    .exercise-inner.has-ex-thumb .weight-person {
      width: 100%;
      text-align: center;
      margin-bottom: 0;
      font-size: 12px;
      letter-spacing: 1.5px;
    }
    .exercise-inner.has-ex-thumb .weight-value-wrap {
      justify-content: center;
      width: 100%;
    }
    .ex-thumb-col {
      flex: 0 0 46%;
      max-width: 48%;
      min-width: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      padding: 5px;
      box-sizing: border-box;
      min-height: 152px;
    }
    .ex-thumb-col .ex-thumb {
      flex: 1 1 auto;
      width: 100%;
      min-height: 152px;
      object-fit: cover;
      object-position: center;
    }
    .img-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Barlow', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }
    .img-btn.has-img { border-color: var(--accent); color: var(--accent); }

    .weight-person {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .weight-value-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .weight-value {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      border-bottom: 1px dashed var(--border);
      transition: border-color 0.15s;
    }
    .weight-value:hover { border-bottom-color: var(--accent); }
    .exercise-weight-stepper .stepper-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 900;
      min-width: 42px;
    }
    .exercise-inner.has-ex-thumb .exercise-weight-stepper .stepper-val { font-size: 21px; }
    .exercise-weight-stepper .stepper-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .bodyweight-value { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 600; }
    .weight-edit-input {
      width: 72px;
      background: var(--s3);
      border: 1px solid var(--accent);
      color: var(--text);
      border-radius: 5px;
      padding: 3px 6px;
      font-size: 22px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    /* ── Notes panel ─────────────────────────────────── */
    .action-btn {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.15s;
    }
    .action-btn:active { opacity: 0.75; }
    .btn-new-week       { background: var(--s3); color: var(--text); border: 1px solid var(--border); }
    .btn-new-week.ready { background: var(--accent); color: #000; border-color: var(--accent); }

    .week-status {
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 14px;
    }
    .week-status-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 4px; }
    .week-status-count { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 900; }
    .week-status-date  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .notes-textarea {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      line-height: 1.5;
      resize: vertical;
      min-height: 120px;
    }
    .notes-textarea:focus { outline: none; border-color: var(--accent); }

    .history-section { margin-top: 24px; }
    .history-item  { background: var(--s2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 13px; margin-bottom: 8px; }
    .history-meta  { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .history-notes { font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.5; }
    .history-exercise-notes { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
    .history-exercise-notes-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .history-ex-note { margin-bottom: 10px; }
    .history-ex-note:last-child { margin-bottom: 0; }
    .history-ex-note-title { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: var(--accent); margin-bottom: 4px; }
    .history-ex-note-body { font-size: 12px; color: var(--text); white-space: pre-wrap; line-height: 1.45; }
    .history-empty { font-style: italic; color: var(--muted); }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">IRONLOG</div>
    <div class="header-week" id="weekLabel"></div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ─── Program ──────────────────────────────────────────────────────────────────

const DAYS = [
  {
    num: 1, name: 'Push A', focus: 'Chest · Shoulders · Triceps',
    exercises: [
      { id: 'chest_press',      name: 'Chest Press',            john: { weight: 125, sets: 3, reps: '6–10'       }, kyong: { weight: 20,  sets: 3, reps: '8–12'      } },
      { id: 'shoulder_press_a', name: 'Shoulder Press',         john: { weight: 50,  sets: 3, reps: '6–10'       }, kyong: { weight: 10,  sets: 3, reps: '10'        } },
      { id: 'triceps_ext',      name: 'Triceps Extension',      john: { weight: 60,  sets: 3, reps: '8–12'       }, kyong: { weight: 10,  sets: 3, reps: '8–12'      } },
      { id: 'pallof_a',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  },
  {
    num: 2, name: 'Lower A', focus: 'Quads · Hamstrings · Glutes',
    exercises: [
      { id: 'leg_press_a',      name: 'Leg Press',              john: { weight: 260, sets: 3, reps: '6–10'       }, kyong: { weight: 60,  sets: 3, reps: '10–12'     } },
      { id: 'leg_curl_a',       name: 'Leg Curl',               john: { weight: 90,  sets: 3, reps: '8–12'       }, kyong: { weight: 20,  sets: 3, reps: '8–12'      } },
      { id: 'leg_ext_a',        name: 'Leg Extension',          john: { weight: 115, sets: 3, reps: '8–12'       }, kyong: { weight: 25,  sets: 3, reps: '8–12'      } },
      { id: 'hello_dolly_a',    name: 'Hello Dollies',          john: { weight: null, sets: 3, reps: '10'        }, kyong: { weight: null, sets: 3, reps: '10'       }, isBodyweight: true },
    ]
  },
  {
    num: 3, name: 'Pull A', focus: 'Back · Biceps · Rear Delts',
    exercises: [
      { id: 'lat_pulldown',     name: 'Lat Pulldown',           john: { weight: 100, sets: 3, reps: '10–12'      }, kyong: { weight: 30,  sets: 3, reps: '10–12'     } },
      { id: 'seated_row',       name: 'Seated Row',             john: { weight: 100, sets: 3, reps: '10–12'      }, kyong: { weight: 30,  sets: 3, reps: '10–12'     } },
      { id: 'face_pull',        name: 'Face Pull',              john: { weight: 40,  sets: 3, reps: '12–15'      }, kyong: { weight: 30,  sets: 3, reps: '10–15'     } },
      { id: 'pallof_c',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  },
  {
    num: 4, name: 'Push B', focus: 'Shoulders · Triceps · Chest vol.',
    exercises: [
      { id: 'shoulder_press_b', name: 'Shoulder Press',         john: { weight: 50,  sets: 3, reps: '10–12'      }, kyong: { weight: 10,  sets: 3, reps: '10–12'     } },
      { id: 'triceps_pushdown', name: 'Triceps Pushdown',       john: { weight: 60,  sets: 3, reps: '10–12'      }, kyong: { weight: 20,  sets: 3, reps: '10–12'     } },
      { id: 'pec_fly',          name: 'Pec Fly',                john: { weight: 115, sets: 3, reps: '8–12'       }, kyong: { weight: 10,  sets: 3, reps: '10–12'     } },
      { id: 'hello_dolly_b',    name: 'Hello Dollies',          john: { weight: null, sets: 3, reps: '10'        }, kyong: { weight: null, sets: 3, reps: '10'       }, isBodyweight: true },
    ]
  },
  {
    num: 5, name: 'Lower B', focus: 'Quads · Hamstrings · Calves vol.',
    exercises: [
      { id: 'leg_press_b',      name: 'Leg Press (vol.)',       john: { weight: 200, sets: 3, reps: '10'         }, kyong: { weight: 50,  sets: 3, reps: '10'        } },
      { id: 'ham_curl_b',       name: 'Hamstring Curl',         john: { weight: 65,  sets: 3, reps: '10'         }, kyong: { weight: 20,  sets: 3, reps: '10'        } },
      { id: 'calf_raise',       name: 'Calf Raise (Leg Press)', john: { weight: 160, sets: 3, reps: '10'         }, kyong: { weight: 50,  sets: 3, reps: '10'        } },
      { id: 'pallof_e',         name: 'Pallof Press',           john: { weight: 50,  sets: 3, reps: '10–12/side' }, kyong: { weight: 20,  sets: 3, reps: '10–12/side'} },
    ]
  }
];

// Bundled machine photos (same repo as index.html). Keys = exercise `id`. User URL in state.images[ex.id] overrides.
const EXERCISE_IMAGES = {
  chest_press:      'images/vertical_chest.png',

  shoulder_press_a: STACK_SHOULDER,

  triceps_ext:      STACK_LAT,

function snapToStack(weight, stack) {
  if (weight == null || weight === undefined || !Array.isArray(stack) || stack.length === 0) return weight;
  const w = Number(weight);
  if (isNaN(w) || w <= 0) return weight;
  if (stack.includes(w)) return w;
  let best = stack[0];
  let bestD = Math.abs(w - best);
  for (const v of stack) {
    const d = Math.abs(w - v);
    if (d < bestD || (d === bestD && v > best)) {
      best = v;
      bestD = d;
    }
  }
  return best;
}

/** Move one step lighter (−1) or heavier (+1) along the stack; clamps at ends. */
function stepStack(stack, current, delta) {
  if (!stack || !stack.length) return current;
  const w = snapToStack(current, stack);
  const i = stack.indexOf(w);
  const start = i >= 0 ? i : 0;
  const j = start + delta;
  if (j < 0) return stack[0];
  if (j >= stack.length) return stack[stack.length - 1];
  return stack[j];
}

function normalizeStackWeights(state) {
  if (!state.weights) return false;
  let changed = false;
  DAYS.forEach(d => d.exercises.forEach(ex => {
    if (ex.isBodyweight) return;
    const stack = EXERCISE_STACK_WEIGHTS[ex.id];
    if (!stack || !stack.length) return;
    if (!state.weights[ex.id]) state.weights[ex.id] = { john: ex.john.weight, kyong: ex.kyong.weight };
    const entry = state.weights[ex.id];
    const j = snapToStack(entry.john, stack);
    const k = snapToStack(entry.kyong, stack);
    if (j !== entry.john) { entry.john = j; changed = true; }
    if (k !== entry.kyong) { entry.kyong = k; changed = true; }
  }));
  return changed;
}

// ─── State ────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'ironlog_v2';

function defaultWeights() {
  const w = {};
  DAYS.forEach(d => d.exercises.forEach(ex => {
    w[ex.id] = { john: ex.john.weight, kyong: ex.kyong.weight };
  }));
  return w;
}

function defaultDayState() {
  return {
    cardio: {
      john:  { weight: 195, swam: false, laps: 101 },
      kyong: { treadmill: false, stairway: false }
    },
    assistDone: { pullups: false, dips: false },
    done: {}
  };
}

function defaultCurrentWeek() {
  return {
    startDate: todayStr(),
    days: Object.fromEntries([1,2,3,4,5].map(n => [n, defaultDayState()])),
    notes: '',
    exerciseNotes: {}
  };
}

function buildFreshState() {
  const s = {
    weights: defaultWeights(),
    images:  {},
    currentWeek: defaultCurrentWeek(),
    history: []
  };
  normalizeStackWeights(s);
  return s;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return buildFreshState();
    const s = JSON.parse(raw);
    [1,2,3,4,5].forEach(n => {
      if (!s.currentWeek.days[n]) {
        s.currentWeek.days[n] = defaultDayState();
      } else {
        const d = s.currentWeek.days[n];
        if (!d.assistDone) d.assistDone = { pullups: false, dips: false };
        if (!d.cardio.john.laps && d.cardio.john.laps !== 0) d.cardio.john.laps = 101;
        if (d.cardio.john.weight === undefined) d.cardio.john.weight = 195;
        if (d.cardio.kyong.treadmill === undefined) d.cardio.kyong.treadmill = false;
        if (d.cardio.kyong.stairway  === undefined) d.cardio.kyong.stairway  = false;
      }
    });
    if (!s.currentWeek.exerciseNotes || typeof s.currentWeek.exerciseNotes !== 'object') {
      s.currentWeek.exerciseNotes = {};
    }
    if (normalizeStackWeights(s)) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch { /* ignore */ }
    }
    return s;
  } catch {
    return buildFreshState();
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ─── Helpers ──────────────────────────────────────────────────────────────────

function todayStr() {
  return new Date().toLocaleDateString('en-CA');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// A day is complete when every exercise in it is checked off
function isDayComplete(dayNum) {
  const day      = DAYS.find(d => d.num === dayNum);
  const dayState = state.currentWeek.days[dayNum];
  return day.exercises.every(ex => dayState.done[ex.id] === true);
}

function allDaysComplete() {
  return [1,2,3,4,5].every(n => isDayComplete(n));
}

function daysCompleteCount() {
  return [1,2,3,4,5].filter(n => isDayComplete(n)).length;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function exerciseNotesHistoryHtml(exerciseNotes) {
  if (!exerciseNotes || typeof exerciseNotes !== 'object') return '';
  const idToTitle = {};
  DAYS.forEach(d => d.exercises.forEach(ex => { idToTitle[ex.id] = ex.name; }));
  const parts = [];
  for (const [id, text] of Object.entries(exerciseNotes)) {
    const t = String(text || '').trim();
    if (!t) continue;
    const label = idToTitle[id] || id;
    parts.push(
      '<div class="history-ex-note">' +
      '<span class="history-ex-note-title">' + esc(label) + '</span>' +
      '<div class="history-ex-note-body">' + esc(t) + '</div></div>'
    );
  }
  if (!parts.length) return '';
  return '<div class="history-exercise-notes"><div class="history-exercise-notes-label">Per-exercise notes</div>' +
    parts.join('') + '</div>';
}

function buildStepper(initialValue, onChange, { min = 0, step = 1 } = {}) {
  let current = initialValue;

  const wrap = document.createElement('div');
  wrap.className = 'stepper';

  const minus = document.createElement('button');
  minus.className = 'stepper-btn minus';
  minus.textContent = '−';
  minus.type = 'button';

  const valEl = document.createElement('span');
  valEl.className = 'stepper-val';
  valEl.textContent = current;

  const plus = document.createElement('button');
  plus.className = 'stepper-btn plus';
  plus.textContent = '+';
  plus.type = 'button';

  minus.addEventListener('click', () => {
    if (current - step >= min) {
      current -= step;
      valEl.textContent = current;
      onChange(current);
    }
  });
  plus.addEventListener('click', () => {
    current += step;
    valEl.textContent = current;
    onChange(current);
  });
  valEl.addEventListener('click', () => {
    const input = document.createElement('input');
    input.className = 'stepper-edit';
    input.type = 'number';
    input.inputMode = 'numeric';
    input.value = current;
    wrap.replaceChild(input, valEl);
    input.focus();
    input.select();
    const commit = () => {
      const v = parseInt(input.value, 10);
      if (!isNaN(v) && v >= min) { current = v; valEl.textContent = current; onChange(current); }
      if (input.parentNode === wrap) wrap.replaceChild(valEl, input);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
  });

  wrap.appendChild(minus);
  wrap.appendChild(valEl);
  wrap.appendChild(plus);
  return wrap;
}

// ─── Collapse state (in-memory, resets on tab switch — top strip collapsed by default) ─

const collapsed = {}; // key "dayNum-section": false = expanded, true/undefined = collapsed

function isCollapsed(dayNum, section) {
  return collapsed[`${dayNum}-${section}`] !== false;
}

function toggleSection(dayNum, section, bodyEl, chevronEl) {
  const key = `${dayNum}-${section}`;
  const isOpen = collapsed[key] === false;
  collapsed[key] = isOpen ? true : false;
  const nowCollapsed = collapsed[key] !== false;
  bodyEl.classList.toggle('collapsed', nowCollapsed);
  chevronEl.classList.toggle('collapsed', nowCollapsed);
}

function buildCollapsibleSection(label, dayNum, sectionKey, buildBody) {
  const wrap = document.createElement('div');

  const toggle = document.createElement('div');
  toggle.className = 'section-toggle';

  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = label;

  const chevron = document.createElement('span');
  chevron.className = 'section-chevron' + (isCollapsed(dayNum, sectionKey) ? ' collapsed' : '');
  chevron.textContent = '▾';

  toggle.appendChild(lbl);
  toggle.appendChild(chevron);

  const body = document.createElement('div');
  body.className = 'section-body' + (isCollapsed(dayNum, sectionKey) ? ' collapsed' : '');
  buildBody(body);

  toggle.addEventListener('click', () => toggleSection(dayNum, sectionKey, body, chevron));

  wrap.appendChild(toggle);
  wrap.appendChild(body);
  return wrap;
}

// ─── Render ───────────────────────────────────────────────────────────────────

let activeTab = 1;

function render() {
  renderWeekLabel();
  renderTabs();
  renderContent();
}

// Lightweight tab-only refresh — called after checkbox changes to update ✓ without resetting scroll
function refreshTabs() {
  renderWeekLabel();
  renderTabs();
}

function renderWeekLabel() {
  document.getElementById('weekLabel').textContent = 'Week of ' + formatDate(state.currentWeek.startDate);
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  DAYS.forEach(day => {
    const complete = isDayComplete(day.num);
    const tab = document.createElement('div');
    tab.className = 'tab'
      + (activeTab === day.num ? ' active' : '')
      + (complete ? ' complete' : '');
    tab.innerHTML = 'Day ' + day.num + (complete ? ' <span class="tab-check">✓</span>' : '');
    tab.addEventListener('click', () => { activeTab = day.num; render(); });
    bar.appendChild(tab);
  });

  const notesTab = document.createElement('div');
  notesTab.className = 'tab' + (activeTab === 'notes' ? ' active' : '');
  notesTab.textContent = 'Notes';
  notesTab.addEventListener('click', () => { activeTab = 'notes'; render(); });
  bar.appendChild(notesTab);
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.appendChild(activeTab === 'notes' ? buildNotesPanel() : buildDayPanel(activeTab));
}

// ─── Exercise card ────────────────────────────────────────────────────────────

function buildExerciseCard(ex, dayState, dayNum) {
  const done   = dayState.done[ex.id] || false;
  const johnW  = (state.weights[ex.id] || {}).john  ?? ex.john.weight;
  const kyongW = (state.weights[ex.id] || {}).kyong ?? ex.kyong.weight;
  const bundled = EXERCISE_IMAGES[ex.id] || '';
  const bundledDark = EXERCISE_IMAGES_DARK[ex.id] || bundled;
  const imgUrl  = state.images[ex.id] || bundledDark;

  const card = document.createElement('div');
  card.className = 'exercise-card' + (done ? ' done' : '');

  const inner = document.createElement('div');
  inner.className = 'exercise-inner';

  const body = document.createElement('div');
  body.className = 'ex-body';

  function openImageUrlPrompt() {
    const def = state.images[ex.id] || bundledDark || '';
    const url = prompt(`Image URL for ${ex.name}:\n(clear to use bundled photo or remove)`, def);
    if (url === null) return;
    const t = url.trim();
    if (!t) {
      delete state.images[ex.id];
    } else {
      state.images[ex.id] = t;
    }
    saveState();
    render();
  }

  // Name row (+ thumbnail column when bundled / custom image exists)
  const nameRow = document.createElement('div');
  nameRow.className = 'ex-name-row';
  const title = document.createElement('div');
  title.className = 'ex-name';
  title.textContent = ex.name;
  nameRow.appendChild(title);

  if (imgUrl) {
    inner.classList.add('has-ex-thumb');
  } else {
    const right = document.createElement('div');
    right.className = 'ex-name-right';
    const imgBtn = document.createElement('button');
    imgBtn.className = 'img-btn';
    imgBtn.type = 'button';
    imgBtn.textContent = 'img';
    imgBtn.title = 'Add image URL';
    imgBtn.addEventListener('click', () => openImageUrlPrompt());
    right.appendChild(imgBtn);
    nameRow.appendChild(right);
  }
  body.appendChild(nameRow);

  const weightStack = document.createElement('div');
  weightStack.className = 'ex-weight-stack';

  ['john', 'kyong'].forEach(person => {
    const exDef = ex[person];
    const wVal  = person === 'john' ? johnW : kyongW;
    const row   = document.createElement('div');
    row.className = 'weight-row';

    const personLabel = document.createElement('div');
    personLabel.className = 'weight-person tag-' + person;
    personLabel.textContent = person.toUpperCase();
    row.appendChild(personLabel);

    if (!ex.isBodyweight) {
      const valueWrap = document.createElement('div');
      valueWrap.className = 'weight-value-wrap';

      const stack = EXERCISE_STACK_WEIGHTS[ex.id];
      if (stack && stack.length) {
        const w = snapToStack(wVal, stack);
        const idx = stack.indexOf(w);
        const stepper = document.createElement('div');
        stepper.className = 'stepper exercise-weight-stepper';

        const minus = document.createElement('button');
        minus.type = 'button';
        minus.className = 'stepper-btn minus';
        minus.textContent = '−';
        minus.disabled = idx <= 0;

        const valEl = document.createElement('span');
        valEl.className = 'stepper-val';
        valEl.textContent = w;

        const plus = document.createElement('button');
        plus.type = 'button';
        plus.className = 'stepper-btn plus';
        plus.textContent = '+';
        plus.disabled = idx >= stack.length - 1;

        const applyStep = delta => {
          const cur = (state.weights[ex.id] || {})[person] ?? ex[person].weight;
          const next = stepStack(stack, cur, delta);
          if (!state.weights[ex.id]) state.weights[ex.id] = {};
          state.weights[ex.id][person] = next;
          saveState();
          render();
        };
        minus.addEventListener('click', () => applyStep(-1));
        plus.addEventListener('click', () => applyStep(1));

        stepper.appendChild(minus);
        stepper.appendChild(valEl);
        stepper.appendChild(plus);
        valueWrap.appendChild(stepper);
      } else {
        const valueEl = document.createElement('span');
        valueEl.className = 'weight-value';
        valueEl.textContent = wVal;
        valueEl.addEventListener('click', () => {
          const input = document.createElement('input');
          input.className = 'weight-edit-input';
          input.type = 'number';
          input.inputMode = 'numeric';
          input.value = wVal;
          valueWrap.replaceChild(input, valueEl);
          input.focus();
          input.select();
          const commit = () => {
            const v = parseInt(input.value, 10);
            if (!isNaN(v) && v > 0) {
              if (!state.weights[ex.id]) state.weights[ex.id] = {};
              state.weights[ex.id][person] = v;
              saveState();
            }
            render();
          };
          input.addEventListener('blur', commit);
          input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
        });

        valueWrap.appendChild(valueEl);
      }
      row.appendChild(valueWrap);
    }

    weightStack.appendChild(row);
  });

  body.appendChild(weightStack);

  const doneRow = document.createElement('label');
  doneRow.className = 'ex-done-row';
  const checkbox = document.createElement('input');
  checkbox.type = 'checkbox';
  checkbox.checked = done;
  checkbox.addEventListener('change', e => {
    dayState.done[ex.id] = e.target.checked;
    saveState();
    card.classList.toggle('done', e.target.checked);
    refreshTabs();
  });
  doneRow.appendChild(checkbox);
  const doneLbl = document.createElement('span');
  doneLbl.className = 'ex-done-label';
  doneLbl.textContent = 'Done';
  doneRow.appendChild(doneLbl);
  body.appendChild(doneRow);

  if (imgUrl) {
    const thumbCol = document.createElement('div');
    thumbCol.className = 'ex-thumb-col';
    const thumb = document.createElement('img');
    thumb.className = 'ex-thumb';
    thumb.src = imgUrl;
    thumb.alt = ex.name;
    thumb.title = 'View full-size image';
    thumb.addEventListener('click', () => {
      const viewSrc = state.images[ex.id] || bundled || imgUrl;
      const q = new URLSearchParams({ src: viewSrc, title: ex.name, id: ex.id });
      const mdPath = bundled ? bundled.replace(/\.(png|jpg|jpeg|webp)$/i, '.md') : '';
      if (mdPath) q.set('md', mdPath);
      const d = DAYS.find(x => x.num === dayNum);
      if (dayNum != null) {
        q.set('day', String(dayNum));
        if (d) q.set('dayName', d.name);
      }
      if (!ex.isBodyweight) {
        const stack = EXERCISE_STACK_WEIGHTS[ex.id];
        const j = stack && stack.length ? snapToStack(johnW, stack) : johnW;
        const k = stack && stack.length ? snapToStack(kyongW, stack) : kyongW;
        q.set('johnW', String(j));
        q.set('kyongW', String(k));
      }
      window.location.href = 'exercise-view.html?' + q.toString();
    });
    thumbCol.appendChild(thumb);
    inner.appendChild(body);
    inner.appendChild(thumbCol);
  } else {
    inner.appendChild(body);
  }

  card.appendChild(inner);
  return card;
}

// ─── Notes panel ──────────────────────────────────────────────────────────────

function buildNotesPanel() {
  const panel = document.createElement('div');
  panel.className = 'panel';

  const complete  = allDaysComplete();
  const doneCount = daysCompleteCount();

  panel.insertAdjacentHTML('beforeend', `
    <div class="week-status">
      <div class="week-status-label">WEEK STATUS</div>
      <div class="week-status-count" style="color:${complete ? 'var(--success)' : 'var(--text)'}">
        ${doneCount}/5 Days Complete${complete ? ' ✓' : ''}
      </div>
      <div class="week-status-date">Week of ${formatDate(state.currentWeek.startDate)}</div>
    </div>
  `);

  panel.insertAdjacentHTML('beforeend', '<div class="section-label">Weekly Feedback &amp; Weight Changes</div>');

  const textarea = document.createElement('textarea');
  textarea.className = 'notes-textarea';
  textarea.placeholder = 'Note weight changes for next week, how sessions felt, what to adjust…';
  textarea.value = state.currentWeek.notes || '';
  textarea.addEventListener('input', e => { state.currentWeek.notes = e.target.value; saveState(); });
  panel.appendChild(textarea);

  const newWeekBtn = document.createElement('button');
  newWeekBtn.type = 'button';
  newWeekBtn.className = 'action-btn btn-new-week' + (complete ? ' ready' : '');
  newWeekBtn.textContent = complete
    ? 'Start New Week'
    : `Start New Week (${5 - doneCount} day${5 - doneCount !== 1 ? 's' : ''} remaining)`;
  newWeekBtn.addEventListener('click', () => {
    if (!complete && !confirm(`Only ${doneCount} of 5 days complete. Start new week anyway?`)) return;
    startNewWeek();
  });
  panel.appendChild(newWeekBtn);

  if (state.history && state.history.length > 0) {
    const histSection = document.createElement('div');
    histSection.className = 'history-section';
    histSection.insertAdjacentHTML('beforeend', '<div class="section-label">Previous Weeks</div>');
    [...state.history].reverse().forEach(week => {
      const days = [1,2,3,4,5].filter(n =>
        DAYS.find(d => d.num === n).exercises.every(ex => week.days?.[n]?.done?.[ex.id] === true)
      ).length;
      const item = document.createElement('div');
      item.className = 'history-item';
      item.innerHTML = `
        <div class="history-meta">Week of ${formatDate(week.startDate)} &middot; ${days}/5 days</div>
        <div class="history-notes">
          ${week.notes ? esc(week.notes) : '<span class="history-empty">No weekly notes recorded</span>'}
        </div>
        ${exerciseNotesHistoryHtml(week.exerciseNotes)}
      `;
      histSection.appendChild(item);
    });
    panel.appendChild(histSection);
  }

  return panel;
}

// ─── New week ─────────────────────────────────────────────────────────────────

function startNewWeek() {
  state.history.push({
    startDate: state.currentWeek.startDate,
    notes: state.currentWeek.notes,
    exerciseNotes: JSON.parse(JSON.stringify(state.currentWeek.exerciseNotes || {})),
    days: JSON.parse(JSON.stringify(state.currentWeek.days))
  });
  state.currentWeek = defaultCurrentWeek();
  saveState();
  downloadHistory();
  activeTab = 1;
  render();
}

function downloadHistory() {
  const data = JSON.stringify(state.history, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'ironlog-history.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
